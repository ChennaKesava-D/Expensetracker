<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Expense</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <div class="container mx-auto p-8">
        <div class="max-w-md mx-auto bg-white rounded-lg border border-gray-200 shadow-md p-6">
            
            <h1 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Add New Expense</h1>
            
            <form action="#" th:action="@{/saveExpense}" th:object="${expense}" method="POST" class="space-y-4">
                
                <div>
                    <label for="date" class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                    <input type="date" th:field="*{date}" id="date" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                    <input type="text" th:field="*{description}" id="description" placeholder="e.g. Monthly Grocery" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Amount ($)</label>
                    <input type="number" step="0.01" th:field="*{amount}" id="amount" placeholder="0.00" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200 shadow-lg">
                        Save Expense
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-sm text-blue-600 hover:underline hover:text-blue-800 transition duration-200">
                    &larr; Back to Expense List
                </a>
            </div>

        </div>
    </div>

</body>
</html>
